app = "chakula-poa-api"
primary_region = "fra"  # Frankfurt (same as your config)

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  ALLOWED_HOSTS = ".fly.dev,.vercel.app,localhost"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
