# =============================================================================
# Chakula Poa - Render.com Deployment Configuration (render.yaml)
# =============================================================================
# This file configures automatic deployment to Render.com
#
# HOW TO DEPLOY:
# ==============
# Option 1: Blueprint (Automatic - Recommended)
#   1. Push your code to GitHub
#   2. Go to https://dashboard.render.com/blueprints
#   3. Click "New Blueprint Instance"
#   4. Connect your GitHub repo
#   5. Render will read this file and create everything automatically
#
# Option 2: Manual Setup
#   1. Go to https://dashboard.render.com
#   2. Create a new PostgreSQL database
#   3. Create a new Web Service
#   4. Set the environment variables listed below
# =============================================================================

databases:
  - name: chakula-poa-db
    databaseName: chakula_poa
    user: chakula_user
    plan: free  # Options: free, starter, standard, pro
    region: frankfurt  # Options: oregon, ohio, virginia, frankfurt, singapore

services:
  - type: web
    name: chakula-poa-api
    runtime: python
    plan: free  # Options: free, starter, standard, pro
    region: frankfurt  # Should match database region for best performance
    
    # Root directory - IMPORTANT: Set this to 'backend' since your Django app is in a subdirectory
    rootDir: backend
    
    # Build settings
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py setup_initial_data || true
    
    # Start command
    startCommand: gunicorn chakula_poa.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    
    # Health check endpoint
    healthCheckPath: /api/health/
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure key
      - key: DATABASE_URL
        fromDatabase:
          name: chakula-poa-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app,localhost"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # You'll set this manually after knowing your Vercel URL
      - key: RENDER
        value: "true"

    # Auto-deploy when you push to main branch
    autoDeploy: true
